<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禎和居家護理管理系統 (旗艦版)</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="禎和護理">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192.png?text=ZH">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .btn-active { background-color: #0d9488 !important; color: white !important; }
        input, select, textarea { border: 1px solid #e2e8f0; }
        .main-container { min-height: 100vh; display: flex; flex-direction: column; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #0d9488; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white shadow-2xl main-container border-x border-teal-50">
        <!-- Header -->
        <div class="bg-teal-700 p-6 text-white text-center">
            <h1 class="text-xl font-bold tracking-widest uppercase">禎和居家護理所</h1>
            <p class="text-teal-100 text-xs mt-1">雲端資料庫同步版</p>
        </div>

        <!-- 導覽列 -->
        <div class="grid grid-cols-4 border-b border-teal-50 bg-stone-50 sticky top-0 z-10 shadow-sm">
            <button onclick="switchSection('staff', this)" class="nav-btn py-4 text-[11px] font-bold text-teal-700 border-r border-stone-200 btn-active">👥 班表</button>
            <button onclick="switchSection('patient', this)" class="nav-btn py-4 text-[11px] font-bold text-teal-700 border-r border-stone-200">📁 管理</button>
            <button onclick="switchSection('checkin', this)" class="nav-btn py-4 text-[11px] font-bold text-teal-700 border-r border-stone-200">📍 簽到</button>
            <button onclick="switchSection('checkout', this)" class="nav-btn py-4 text-[11px] font-bold text-teal-700">🩺 紀錄</button>
        </div>

        <!-- 表單 -->
        <form id="mainForm" name="google-sheet" class="p-5 space-y-6 flex-grow overflow-y-auto pb-24">
            <!-- 隱藏欄位：自動記錄時間 -->
            <input type="hidden" name="Timestamp" id="timestamp">

            <!-- 1. 人員班表 -->
            <div id="staff" class="form-section active space-y-4">
                <div class="bg-teal-50 p-4 rounded-2xl border border-teal-100"><h2 class="text-teal-800 font-bold">護理人員出勤</h2></div>
                <label class="block"><span class="text-sm font-bold">執行護理師</span>
                    <select name="NurseName" class="mt-1 block w-full rounded-xl p-4 text-base">
                        <option>熊繼珍 (zh-2026-001)</option>
                        <option>吳幼合 (zh-2026-002)</option>
                        <option>莊春葉 (zh-2026-003)</option>
                    </select>
                </label>
                <label class="block"><span class="text-sm font-bold">目前里程數</span>
                    <input type="number" name="Mileage" class="mt-1 block w-full rounded-xl p-4 text-base" placeholder="km">
                </label>
            </div>

            <!-- 2. 個案管理 -->
            <div id="patient" class="form-section space-y-4">
                <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100"><h2 class="text-indigo-800 font-bold">個案管理</h2></div>
                <select name="PatientAction" class="w-full rounded-xl p-4 text-base" onchange="togglePatientForm(this.value)">
                    <option value="eval">📝 基本評估</option>
                    <option value="open">🤝 收案</option>
                    <option value="close">🚪 結案</option>
                </select>
                <input type="text" name="PatientName" class="w-full rounded-xl p-4 text-base" placeholder="個案姓名">
                <textarea name="PatientNotes" class="w-full rounded-xl p-4 text-base" placeholder="相關紀錄..."></textarea>
            </div>

            <!-- 3. 訪視簽到 -->
            <div id="checkin" class="form-section space-y-4">
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100"><h2 class="text-blue-800 font-bold">抵達簽到</h2></div>
                <input type="text" name="CheckInTarget" class="w-full rounded-xl p-4 text-base" placeholder="訪視對象姓名">
            </div>

            <!-- 4. 護理紀錄 -->
            <div id="checkout" class="form-section space-y-4">
                <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100"><h2 class="text-orange-800 font-bold">專業護理紀錄</h2></div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" name="VitalSigns_BP" class="rounded-xl p-3 text-sm" placeholder="BP: 120/80">
                    <input type="text" name="VitalSigns_P" class="rounded-xl p-3 text-sm" placeholder="P: 72">
                </div>
                <textarea name="NursingRecord" class="w-full rounded-xl p-4 text-base" rows="4" placeholder="詳細紀錄..."></textarea>
            </div>
        </form>

        <!-- 提交按鈕 -->
        <div class="p-5 bg-white border-t border-gray-100 fixed bottom-0 max-w-md w-full shadow-lg">
            <button id="submitBtn" type="button" onclick="handleFormSubmit()" class="w-full bg-teal-600 text-white font-bold py-4 rounded-2xl active:scale-95 transition-all flex items-center justify-center">
                <span id="btnText">確認送出雲端存檔</span>
                <span id="loadingIcon" class="hidden ml-2 loading-spinner"></span>
            </button>
        </div>

        <!-- 成功訊息 -->
        <div id="successMsg" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-10 text-center">
            <div class="w-24 h-24 bg-teal-100 rounded-full flex items-center justify-center mb-6"><span class="text-5xl">✅</span></div>
            <h2 class="text-2xl font-bold text-teal-800">上傳完成</h2>
            <p class="text-gray-500 mt-2">資料已同步至 Google 試算表</p>
            <button onclick="location.reload()" class="mt-10 bg-gray-800 text-white px-8 py-3 rounded-xl font-bold">返回填寫下一筆</button>
        </div>
    </div>

    <script>
        // *** 重要：請在此處替換成您的 Google App Script URL ***
        const scriptURL = https://script.google.com/macros/s/AKfycbwpsMlri_y9W4yRms__fCJdbUdvfnaUiAEcN_MFFjDjDwmK8Q98V6WCeO775xEW46j2/exec 

        function switchSection(id, btn) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
        }

        function handleFormSubmit() {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loadingIcon');
            const form = document.forms['google-sheet'];

            // 禁用按鈕防止重複點擊
            btn.disabled = true;
            btnText.innerText = '正在傳送...';
            loading.classList.remove('hidden');
            document.getElementById('timestamp').value = new Date().toLocaleString();

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    document.getElementById('mainForm').classList.add('hidden');
                    document.getElementById('successMsg').classList.remove('hidden');
                })
                .catch(error => {
                    alert('傳送失敗，請檢查網路連線！');
                    btn.disabled = false;
                    btnText.innerText = '確認送出雲端存檔';
                    loading.classList.add('hidden');
                });
        }
    </script>
</body>
</html>
