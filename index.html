<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禎和居家護理管理系統 (旗艦版)</title>
    <!-- PWA 必要的 Meta 標籤 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="禎和護理">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192.png?text=ZH">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .btn-active { background-color: #0d9488 !important; color: white !important; }
        input[type="number"], input[type="text"], input[type="date"], select, textarea {
            border: 1px solid #e2e8f0;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #0d9488;
            outline: none;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }
        /* 針對手機端優化的高度 */
        .main-container { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white shadow-2xl main-container border-x border-teal-50">
        <!-- Header -->
        <div class="bg-teal-700 p-6 text-white text-center shadow-md">
            <h1 class="text-xl font-bold tracking-widest uppercase text-white">禎和居家護理所</h1>
            <p class="text-teal-100 text-xs mt-1">人員班表 | 個案管理 | 護理申報</p>
        </div>

        <!-- 快速導覽切換 -->
        <div class="grid grid-cols-4 border-b border-teal-50 bg-stone-50 sticky top-0 z-10 shadow-sm">
            <button onclick="switchSection('staff', this)" class="nav-btn py-4 text-[11px] font-bold text-teal-700 border-r border-stone-200 hover:bg-teal-100 btn-active transition-colors">
                👥 班表
            </button>
            <button onclick="switchSection('patient', this)" class="nav-btn py-4 text-[11px] font-bold text-teal-700 border-r border-stone-200 hover:bg-teal-100 transition-colors">
                📁 管理
            </button>
            <button onclick="switchSection('checkin', this)" class="nav-btn py-4 text-[11px] font-bold text-teal-700 border-r border-stone-200 hover:bg-teal-100 transition-colors">
                📍 簽到
            </button>
            <button onclick="switchSection('checkout', this)" class="nav-btn py-4 text-[11px] font-bold text-teal-700 hover:bg-teal-100 transition-colors">
                🩺 紀錄
            </button>
        </div>

        <!-- 表單主體 -->
        <form id="mainForm" class="p-5 space-y-6 flex-grow overflow-y-auto pb-24">
            
            <!-- 1. 人員班表與出勤區塊 -->
            <div id="staff" class="form-section active space-y-4 animate-in fade-in">
                <div class="bg-teal-50 p-4 rounded-2xl border border-teal-100">
                    <h2 class="text-teal-800 font-bold flex items-center"><span class="mr-2">👥</span>護理人員出勤</h2>
                </div>
                <label class="block">
                    <span class="text-stone-700 text-sm font-bold">執行護理師</span>
                    <select class="mt-1 block w-full rounded-xl bg-white p-4 text-base">
                        <option value="zh-2026-001">熊繼珍 (zh-2026-001)</option>
                        <option value="zh-2026-002">吳幼合 (zh-2026-002)</option>
                        <option value="zh-2026-003">莊春葉 (zh-2026-003)</option>
                    </select>
                </label>
                <label class="block">
                    <span class="text-stone-700 text-sm font-bold">目前里程數 (km)</span>
                    <input type="number" class="mt-1 block w-full rounded-xl bg-white p-4 text-base" placeholder="請紀錄機車/汽車里程">
                </label>
            </div>

            <!-- 2. 個案管理模組 -->
            <div id="patient" class="form-section space-y-4 animate-in fade-in">
                <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                    <h2 class="text-indigo-800 font-bold flex items-center"><span class="mr-2">📁</span>個案合約與評估</h2>
                </div>
                <label class="block">
                    <span class="text-stone-700 text-sm font-bold">操作類別</span>
                    <select class="mt-1 block w-full rounded-xl bg-white p-4 text-base" onchange="togglePatientForm(this.value)">
                        <option value="eval">📝 基本評估單</option>
                        <option value="open">🤝 新收案簽署</option>
                        <option value="close">門 結案申請</option>
                    </select>
                </label>
                <div id="evalForm" class="space-y-4">
                    <input type="text" class="w-full rounded-xl p-4 text-base" placeholder="個案姓名">
                    <input type="text" class="w-full rounded-xl p-4 text-base" placeholder="身分證字號">
                    <textarea class="w-full rounded-xl p-4 text-base" placeholder="主要診斷與過敏史"></textarea>
                </div>
                <div id="openForm" class="hidden space-y-4">
                    <label class="block text-xs font-bold text-gray-500">收案日期</label>
                    <input type="date" class="w-full rounded-xl p-4 text-base">
                </div>
                <div id="closeForm" class="hidden space-y-4">
                    <label class="block text-xs font-bold text-gray-500">結案原因</label>
                    <select class="w-full rounded-xl p-4 text-base">
                        <option>住院中</option>
                        <option>死亡</option>
                        <option>康復</option>
                    </select>
                </div>
            </div>

            <!-- 3. 訪視簽到 -->
            <div id="checkin" class="form-section space-y-4 animate-in fade-in">
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <h2 class="text-blue-800 font-bold flex items-center"><span class="mr-2">🏠</span>抵達現場簽到</h2>
                </div>
                <input type="text" class="w-full rounded-xl p-4 text-base" placeholder="搜尋個案姓名...">
                <div class="p-4 bg-gray-50 rounded-xl text-xs text-gray-500 italic text-center">
                    點擊提交將自動記錄座標與時間
                </div>
            </div>

            <!-- 4. 訪視簽退與紀錄 -->
            <div id="checkout" class="form-section space-y-6 animate-in fade-in">
                <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100">
                    <h2 class="text-orange-800 font-bold flex items-center"><span class="mr-2">🩺</span>專業護理紀錄</h2>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="text" class="rounded-xl p-3 text-sm" placeholder="BP: 120/80">
                    <input type="text" class="rounded-xl p-3 text-sm" placeholder="P: 72">
                </div>
                <textarea class="w-full rounded-xl p-4 text-base" rows="4" placeholder="請輸入護理紀錄與衛教重點..."></textarea>
            </div>
        </form>

        <!-- 提交按鈕區域 -->
        <div class="p-5 bg-white border-t border-gray-100 fixed bottom-0 max-w-md w-full shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <button type="button" onclick="submitData()" class="w-full bg-teal-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                確認送出所有紀錄
            </button>
        </div>

        <!-- 成功訊息 -->
        <div id="successMsg" class="hidden fixed inset-0 bg-white z-50 flex flex-col items-center justify-center p-10 text-center">
            <div class="w-24 h-24 bg-teal-100 rounded-full flex items-center justify-center mb-6">
                <span class="text-5xl">✅</span>
            </div>
            <h2 class="text-2xl font-bold text-teal-800">上傳完成</h2>
            <p class="text-gray-500 mt-2">資料已同步至雲端管理系統</p>
            <button onclick="location.reload()" class="mt-10 bg-gray-800 text-white px-8 py-3 rounded-xl font-bold">返回</button>
        </div>
    </div>

    <script>
        function switchSection(sectionId, btn) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('btn-active'));
            btn.classList.add('btn-active');
            window.scrollTo(0,0);
        }

        function togglePatientForm(val) {
            ['evalForm', 'openForm', 'closeForm'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(val + 'Form').classList.remove('hidden');
        }

        function submitData() {
            // 此處可擴充傳送至 Google Sheets 的 API
            document.getElementById('mainForm').classList.add('hidden');
            document.getElementById('successMsg').classList.remove('hidden');
            if (navigator.vibrate) navigator.vibrate(100);
        }

        // 模擬 PWA Service Worker 註冊
        if ('serviceWorker' in navigator) {
            console.log('PWA Ready');
        }
    </script>
</body>
</html>
